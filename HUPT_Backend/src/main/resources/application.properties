spring.application.name=HUPT_Backend

#spring.datasource.url=jdbc:postgresql://localhost:5432/hupt_db
#spring.datasource.username=ferob
#spring.datasource.password=postgres

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.show-sql=false

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#app.jwt.secret=THIS_IS_A_VERY_LONG_SECRET_KEY_CHANGE_ME_12345678901234567890
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000